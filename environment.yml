name: hybrid-profiler
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - numpy>=1.24
  - pandas>=2.0
  - psutil>=5.9
  # Core DL stack (GPU build by default). For CPU-only, see notes below.
  - pytorch::pytorch>=2.1
  - pytorch::torchvision>=0.16
  - pytorch-cuda=12.1  # Remove this line and add 'cpuonly' (from pytorch channel) for CPU-only nodes
  # GPU telemetry
  - pynvml>=11.5  # conda-forge provides pynvml
  # NLP models
  - transformers>=4.40
  # Optional helpers (safe to keep; can help with HF model loading)
  - huggingface_hub>=0.20
  - safetensors>=0.4
  
  - pip:
      # CPU energy (RAPL). Requires read access to /sys/class/powercap/intel-rapl/* on Linux
      - pyRAPL>=0.2.3
