name: CI Smoke Test

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install PyTorch (CPU-only)
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
      - name: Install other dependencies
        run: |
          pip install -r requirements.txt
      - name: Run profiler smoke test (CPU-only)
        run: |
          mkdir -p data/test-ci
          python src/profiler.py --model simple_mlp --no_gpu --precision fp32 --warmup 1 --measure 1 --output_dir data/test-ci
      - name: Verify outputs
        run: |
          test -f data/test-ci/simple_mlp_metrics.csv
          test -f data/test-ci/simple_mlp_meta.json
